<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Display / headings: Instrument Serif (per Figma 44:7372 — "Instrument Serif for display & headings")
      Body / paragraphs: SF Pro Rounded (per Figma 41:228) — Apple system font, not on Google Fonts.
        Stack tries SF Pro Rounded on Apple devices first, then falls back to Nunito (closest Google
        Font equivalent) on other platforms.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TalentHub — connecting talent with opportunity." />
    <title>TalentHub</title>
  </head>
  <body>

    <div id="toast-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
